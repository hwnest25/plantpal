<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xml:lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Plant Gallery</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body>

    <main class="container-wide">
        <nav class="page-nav actions" style="margin: 0 0 14px 0;">
        <a class="btn secondary" th:href="@{/}">Home</a>
        <a class="btn secondary" th:href="@{/quiz}">Quiz</a>
        <a class="btn secondary" th:href="@{/plants}">Gallery</a>
        <a class="btn secondary" th:href="@{/search}">Search</a>
    </nav>

        <h1>Your potential plant pals</h1>

        <div class="gallery-grid">

            <div class="gallery-card" th:each="plant : ${plants}">

                <img 
                    class="gallery-img"
                    th:src="@{'/' + ${plant.plantImageUrl}}" 
                    alt="This is what the plant looks like.">

                <h2 th:text="${plant.plantName != null ? plant.plantName : 'Plant Name'}">Plant Name</h2>

                <p>
                    <em th:text="${plant.plantScientificName}"></em>
                </p>

                <p th:text="${plant.plantDescription}"></p>

                <ul>
                    <li><strong>Environment:</strong>
                        <span th:text="${plant.plantEnvironment}"></span>
                    </li>

                    <li><strong>Care Level:</strong>
                        <span th:text="${plant.plantCareLevel}"></span>
                    </li>

                    <li><strong>Growth Speed:</strong>
                        <span th:text="${plant.plantGrowthSpeed}"></span>
                    </li>

                    <li><strong>Pet Safe:</strong>
                        <span th:text="${plant.petSafe} ? 'Yes' : 'No'"></span>
                    </li>
                    
                    <li><strong>Edible:</strong>
                        <span th:text="${plant.edible} ? 'Yes' : 'No'"></span>
                    </li>

                </ul>

            </div>

        </div>

    </main>

</body>
</html>
