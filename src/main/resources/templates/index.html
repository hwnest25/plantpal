<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xml:lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PlantPal</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body>
<main class="container-wide">

  <nav class="page-nav actions">
    <a class="btn secondary" th:href="@{/}">Home</a>
    <a class="btn secondary" th:href="@{/quiz}">Quiz</a>
    <a class="btn secondary" th:href="@{/plants}">Gallery</a>
    <a class="btn secondary" th:href="@{/search}">Search</a>
  </nav>

  <section class="home-hero">
    <div class="home-hero-top">
      <h1>Welcome to Plant Pal</h1>

      <div class="actions">
        <a class="btn" th:href="@{/quiz}">Start Quiz</a>
        <a class="btn secondary" th:href="@{/plants}">Browse Gallery</a>
        <a class="btn secondary" th:href="@{/search}">Search Plants</a>
      </div>
    </div>

    <div class="home-hero-media">
      <img class="home-hero-img"
           th:src="@{/assets/plant_pal_all_plants.png}"
           alt="A collage of plant images featured in PlantPal">
    </div>
  </section>

</main>
</body>
</html>
